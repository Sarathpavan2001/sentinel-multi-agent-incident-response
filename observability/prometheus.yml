global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: sentinel

scrape_configs:
  - job_name: sentinel
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: sentinel-noc
          env: dev
